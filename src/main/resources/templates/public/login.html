<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" th:href="@{/styles/style.css}"/>
    <title>Вход</title>
</head>
<body>
    <div class="login-box">
        <div class="logo">sicelica</div>

        <form id="loginForm">
            <input id="username" class="input" type="text"
                   placeholder="логин" required/>
            <input id="password" class="input" type="password"
                   placeholder="пароль" required/>

            <div class="row">
                <label>
                    <input type="checkbox" name="remember-me"> Запомнить меня
                </label>
            </div>

            <div id="errorBox" class="errorBox">
                Неверный логин или пароль
            </div>

            <button class="btn" type="submit">Войти</button>
        </form>

        <div class="bottom-links">
            <a th:href="@{/register}">Зарегистрироваться</a>
            <a th:href="@{/passreset}">Забыли пароль?</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('loginForm')
                .addEventListener('submit', async function (e) {
                    e.preventDefault();


                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;

                    console.log('Отправляем:', {username, password});

                    try {
                        const response = await fetch('/api/v1/auth/login', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({username, password})
                        });

                        if (!response.ok) {
                            document.getElementById('errorBox').style.display = 'block';
                            return;
                        }

                        console.log('Статус:', response.status);

                        const data = await response.json();

                        console.log('Ответ:', data);

                        if (response.ok && data.accessToken) {
                            localStorage.setItem('accessToken', data.accessToken);
                            localStorage.setItem('refreshToken', data.refreshToken);
                            console.log('Токен сохранён, переходим на /chat');
                            window.location.href = '/chat';
                        } else {
                            document.getElementById('errorBox').style.display = 'block';
                            console.log('Ошибка авторизации:', data);
                        }
                    } catch (err) {
                        console.error('Ошибка запроса:', err);
                        document.getElementById('errorBox').style.display = 'block';
                    }
                });
            ['username', 'password'].forEach(id => {
                document.getElementById(id).addEventListener('input', function () {
                    document.getElementById('errorBox').style.display = 'none';
                });
            });
        });
    </script>
</body>
</html>
